<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Curso</title>
</head>
<body>
<h1>Nuevo Curso</h1>
<form th:action="@{/cursos/guardar}" th:object="${curso}" method="post">
    <label>Nombre:
        <input type="text" th:field="*{nombre}" />
    </label>
    <span th:if="${#fields.hasErrors('nombre')}"
          th:errors="*{nombre}" style="color:red"></span><br/>

    <label>Créditos:
        <input type="number" th:field="*{creditos}" />
    </label><br/>

    <button type="submit">Guardar</button>
</form>
<a th:href="@{/cursos}">Volver</a>
</body>
</html>
